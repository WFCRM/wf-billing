<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhaleFast — เปิดบิลรายรับ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg:      #f5f4f0;
  --bg2:     #ffffff;
  --bg3:     #eeede8;
  --border:  #e2e0d8;
  --border2: #ccc9be;
  --text:    #1c1b17;
  --text2:   #5c5a52;
  --text3:   #9c9a92;
  --font-mono: 'IBM Plex Mono', monospace;

  /* Brand */
  --blue:        #1b4fff;
  --blue-bg:     #eff3ff;
  --blue-border: #bfcfff;
  --green:       #0a7c55;
  --green-bg:    #edfaf3;
  --green-border:#a3e9c8;
  --amber:       #8a5000;
  --amber-bg:    #fff8e6;
  --amber-border:#fcd97a;
  --red:         #9b1c1c;
  --red-bg:      #fff1f1;
  --red-border:  #fca5a5;
  --purple:      #5b21b6;
  --purple-bg:   #f5f0ff;
  --purple-border:#c4b5fd;
  --gray:        #4b4a47;
  --gray-bg:     #f0efeb;
  --gray-border: #d6d4cc;

  --radius: 8px;
  --radius-sm: 5px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.55;
  min-height: 100vh;
}

.layout { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 224px;
  background: var(--text);
  border-right: none;
  padding: 0;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.logo {
  padding: 22px 18px 18px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.logo-mark {
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 32px; height: 32px; background: var(--blue);
  border-radius: 8px; display: flex; align-items: center;
  justify-content: center;
}
.logo-icon svg { width: 18px; height: 18px; }
.logo-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.4px; }
.logo-sub { font-size: 11px; color: rgba(255,255,255,.4); font-family: var(--font-mono); margin-top: 2px; }

.nav { padding: 12px 0; flex: 1; }
.nav-section {
  padding: 12px 18px 5px;
  font-size: 10px; font-weight: 600;
  color: rgba(255,255,255,.3); letter-spacing: 1px; text-transform: uppercase;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px 9px 18px; font-size: 13px; color: rgba(255,255,255,.55);
  cursor: pointer; transition: all .13s; border-radius: 0;
  border-left: 2px solid transparent; margin: 1px 0;
}
.nav-item:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.9); }
.nav-item.active {
  color: #fff; background: rgba(27,79,255,.35);
  border-left-color: var(--blue); font-weight: 600;
}
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .6; }
.nav-item.active svg { opacity: 1; }

.nav-badge {
  margin-left: auto; padding: 2px 7px;
  background: var(--blue); color: #fff;
  border-radius: 10px; font-size: 10px; font-weight: 600;
}

/* Main */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 1px 0 var(--border);
}
.topbar-left { display: flex; flex-direction: column; gap: 2px; }
.topbar-title { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
.topbar-sub { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
.topbar-right { display: flex; align-items: center; gap: 10px; }

.content { padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; font-size: 12px; font-family: inherit;
  border-radius: var(--radius-sm); cursor: pointer; font-weight: 500;
  border: 1px solid var(--border2);
  background: var(--bg2); color: var(--text2);
  transition: all .12s; white-space: nowrap;
}
.btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.btn-primary:hover { background: #1544e0; border-color: #1544e0; color: #fff; }
.btn-green { background: var(--green); border-color: var(--green); color: #fff; }
.btn-green:hover { filter: brightness(.92); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* Cards */
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; box-shadow: var(--shadow);
}
.card-hd {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg2);
}
.card-title { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 7px; }
.card-body { padding: 16px 18px; }

/* Badges */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  letter-spacing: .1px;
}
.badge-blue   { background: var(--blue-bg);   color: var(--blue);   border: 1px solid var(--blue-border);   }
.badge-green  { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border);  }
.badge-amber  { background: var(--amber-bg);  color: var(--amber);  border: 1px solid var(--amber-border);  }
.badge-red    { background: var(--red-bg);    color: var(--red);    border: 1px solid var(--red-border);    }
.badge-purple { background: var(--purple-bg); color: var(--purple); border: 1px solid var(--purple-border); }
.badge-gray   { background: var(--gray-bg);   color: var(--gray);   border: 1px solid var(--gray-border);   }

/* Grid */
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* Metric */
.metric {
  background: var(--bg2); border-radius: 10px; padding: 14px 16px;
  border: 1px solid var(--border); box-shadow: var(--shadow);
}
.metric-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-weight: 500; letter-spacing: .3px; }
.metric-value { font-size: 24px; font-weight: 700; line-height: 1; letter-spacing: -.5px; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 5px; font-family: var(--font-mono); }

/* Upload zone */
.upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.upload-zone {
  border: 1.5px dashed var(--border2); border-radius: 10px;
  padding: 16px 12px; text-align: center; cursor: pointer;
  transition: all .15s; position: relative; overflow: hidden;
  background: var(--bg2);
}
.upload-zone:hover { border-color: var(--blue); background: var(--blue-bg); }
.upload-zone.done { border-style: solid; border-color: var(--green-border); background: var(--green-bg); }
.upload-zone.done:hover { border-color: var(--green); }
.upload-zone.missing { border-color: var(--border); background: var(--bg3); opacity: .6; }
.uz-icon { font-size: 22px; margin-bottom: 6px; }
.uz-name { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.uz-sub { font-size: 10px; color: var(--text3); }
.uz-check { position: absolute; top: 7px; right: 7px; width: 17px; height: 17px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
input[type=file] { display: none; }

/* Alert */
.alert {
  border-radius: 8px; padding: 10px 14px;
  display: flex; align-items: flex-start; gap: 10px; font-size: 12px;
}
.alert-amber { background: var(--amber-bg); border: 1px solid var(--amber-border); color: var(--amber); }
.alert-blue  { background: var(--blue-bg);  border: 1px solid var(--blue-border);  color: var(--blue);  }
.alert-green { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
.alert-icon { flex-shrink: 0; margin-top: 1px; }

/* Table */
.tbl-wrap { overflow-x: auto; }
.tbl {
  width: 100%; border-collapse: collapse;
  font-size: 12px; table-layout: fixed;
}
.tbl th {
  padding: 9px 12px; text-align: left;
  font-size: 10px; color: var(--text3); font-weight: 600;
  letter-spacing: .6px; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  background: var(--bg); white-space: nowrap;
}
.tbl td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  color: var(--text); vertical-align: middle;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: #fafaf8; }
.tbl .right { text-align: right; }
.tbl .muted { color: var(--text3); font-size: 11px; }
.tbl .mono { font-family: var(--font-mono); }
.tbl input[type=checkbox] { accent-color: var(--blue); width: 14px; height: 14px; cursor: pointer; }

/* Footer bar */
.footer-bar {
  padding: 12px 18px; border-top: 1px solid var(--border);
  background: var(--bg); display: flex; align-items: center; justify-content: space-between;
}

/* Progress steps */
.steps { display: flex; flex-direction: column; gap: 6px; }
.step-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 7px; font-size: 12px;
  background: var(--bg3); border: 1px solid var(--border);
}
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; flex-shrink: 0;
}
.step-done { background: var(--green); color: #fff; }
.step-active { background: var(--blue); color: #fff; }
.step-todo { background: var(--bg2); border: 1px solid var(--border2); color: var(--text3); }

/* Type tag */
.type-tag {
  display: inline-flex; padding: 1px 6px;
  border-radius: 4px; font-size: 10px; font-weight: 500;
  font-family: 'IBM Plex Mono', monospace;
}

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* Tabs */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); padding: 0 16px; }
.tab {
  padding: 9px 14px; font-size: 12px; cursor: pointer;
  color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }

/* Empty state */
.empty { padding: 32px; text-align: center; color: var(--text3); font-size: 13px; }
.empty svg { width: 36px; height: 36px; margin: 0 auto 10px; display: block; opacity: .3; }
</style>
</head>
<body>
<div class="layout">

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 12L6 4h3l5 8H2Z" fill="white" opacity=".9"/><path d="M6 8l2-4 2 4" fill="white"/></svg>
      </div>
      <div>
        <div class="logo-name">WhaleFast</div>

  <div class="nav">

  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="page-title">อัปโหลดไฟล์รายงาน</div>

  <div class="content" id="main-content">

const MONTHS_TH = ['ม.ค','ก.พ','มี.ค','เม.ย','พ.ค','มิ.ย','ก.ค','ส.ค','ก.ย','ต.ค','พ.ย','ธ.ค'];

function getFlowName(subAcc) {
  const acc = String(subAcc).trim();
  // 1. ลอง ACCOUNT_MAPPING ตรงๆ ก่อน (map ครอบคลุมทั้ง CZ-xxx และ CZ0108-xxx แล้ว)
  if (ACCOUNT_MAPPING[acc]?.flowName) return ACCOUNT_MAPPING[acc].flowName;
  // 2. normalize แล้วลองอีกครั้ง
  if (/^CZ-\d+/.test(acc)) {
    const norm = 'CZ0108-' + acc.replace('CZ-','');
    if (ACCOUNT_MAPPING[norm]?.flowName) return ACCOUNT_MAPPING[norm].flowName;
  }
  if (/^CZ0108-\d+/.test(acc)) {
    const norm = 'CZ-' + acc.replace('CZ0108-','');
    if (ACCOUNT_MAPPING[norm]?.flowName) return ACCOUNT_MAPPING[norm].flowName;
  }
  // 3. fallback: ใช้ชื่อจาก CustomerTypes Sheet (ตัดเลขนำหน้าแล้ว)
  const ct = state.customerTypes[acc];
  if (ct?.name) return ct.name;
  return acc;
}

const CUST_PAGE_SIZE = 20;

function renderCustomers() {
  const entries   = Object.entries(state.customerTypes);
  const totalPages= Math.max(1, Math.ceil(entries.length / CUST_PAGE_SIZE));
  const page      = Math.min(state.customerPage || 1, totalPages);
  const pageData  = entries.slice((page-1)*CUST_PAGE_SIZE, page*CUST_PAGE_SIZE);

  const typeColors = {
    'Credit7D':'badge-blue','Credit15D':'badge-purple','Credit30D':'badge-red',
    'เปิดบิลรวม':'badge-amber','ไม่ต้องปิดใบเสร็จ':'badge-gray',
    'Internal(ไม่เปิดบิล)':'badge-red',
  };

  // summary
  const summary = {};
  entries.forEach(([,v]) => {
    const t = v.type || 'เงินสด';
    summary[t] = (summary[t]||0) + 1;
  });

  const summaryHtml = Object.entries(summary).map(([t,c]) =>
    `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px">
      <div style="font-weight:500">${c} accounts</div>
      <div style="font-size:11px;color:var(--text3)">${t}</div>
    </div>`).join('');

  const rows = pageData.map(([acc, v]) => {
    const badge = typeColors[v.type] || 'badge-gray';
    return `<tr>
      <td style="font-family:var(--font-mono);font-size:11px">${acc}</td>
      <td style="font-size:12px">${v.name || '-'}</td>
      <td><span class="badge ${badge}" style="font-size:10px">${v.type || 'เงินสด'}</span></td>
    </tr>`;
  }).join('');

  const pagerHtml = totalPages > 1 ? `
    <div style="display:flex;align-items:center;gap:6px;padding:10px 16px;border-top:1px solid var(--border)">
      <button class="btn btn-sm" onclick="changeCustPage(${page-1})" ${page<=1?'disabled':''}>← ก่อนหน้า</button>
      <span style="font-size:12px;color:var(--text2)">หน้า ${page} / ${totalPages}</span>
      <button class="btn btn-sm" onclick="changeCustPage(${page+1})" ${page>=totalPages?'disabled':''}>ถัดไป →</button>
    </div>` : '';

  const loaded = entries.length > 0;

  return `
  <div class="card">
    <div class="card-hd">
      <div class="card-title">อัปโหลดไฟล์ data ลค.</div>
      <div style="display:flex;gap:6px;align-items:center">
        ${loaded ? `<span class="badge badge-green">${entries.length} accounts โหลดแล้ว</span>` : '<span class="badge badge-amber">ยังไม่มีข้อมูล</span>'}
        ${loaded ? `<button class="btn btn-sm" style="color:var(--red);border-color:var(--red)" onclick="clearCustomers()">ล้างข้อมูล ✕</button>` : ''}
      </div>
    </div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:10px">
      <div style="font-size:12px;color:var(--text2)">อัปโหลดไฟล์ <strong>Dataลูกค้าเพื่อใช้เปิดใบวางบิล.xlsx</strong> — หากอัปโหลดซ้ำจะแทนที่ข้อมูลเดิมทั้งหมด</div>
      <label style="cursor:pointer">
        <input type="file" accept=".xlsx,.xls" onchange="handleCustomerFile(event)" style="display:none">
        <div style="border:1.5px dashed var(--border2);border-radius:8px;padding:14px;text-align:center;background:var(--bg3)">
          <div style="font-size:18px;margin-bottom:4px">📂</div>
          <div style="font-size:12px;font-weight:500">${loaded ? 'คลิกเพื่ออัปโหลดใหม่ (จะแทนที่ข้อมูลเดิม)' : 'คลิกเพื่ออัปโหลดไฟล์ data ลค.'}</div>
          <div style="font-size:11px;color:var(--text3)">รองรับ .xlsx</div>
        </div>
      </label>
      ${loaded ? `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${summaryHtml}</div>
      <div class="card">
        <div class="card-hd">
          <div class="card-title">รายการทั้งหมด</div>
          <span style="font-size:11px;color:var(--text3)">แสดง ${(page-1)*CUST_PAGE_SIZE+1}–${Math.min(page*CUST_PAGE_SIZE,entries.length)} จาก ${entries.length}</span>
        </div>

          <table class="tbl">
            <thead><tr><th>Sub Account</th><th>ชื่อลูกค้า</th><th>ประเภท</th></tr></thead>
            <tbody>${rows}</tbody>

function changeCustPage(p) {
  const total = Math.ceil(Object.keys(state.customerTypes).length / CUST_PAGE_SIZE);
  state.customerPage = Math.max(1, Math.min(p, total));
  const c = document.getElementById('main-content');
  if (c) c.innerHTML = renderCustomers();
}

function clearCustomers() {
  if (confirm('ล้างข้อมูลลูกค้าทั้งหมด ' + Object.keys(state.customerTypes).length + ' accounts?')) {
    state.customerTypes = {};
    state.customerPage  = 1;
    render();
  }
}

function handleCustomerFile(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb    = XLSX.read(e.target.result, { type:'array' });
    const sname = wb.SheetNames.find(n => n.includes('data ลค') || n.startsWith('data'));
    if (!sname) { alert('ไม่พบ sheet "data ลค." ในไฟล์ครับ'); return; }
    const rows  = XLSX.utils.sheet_to_json(wb.Sheets[sname], { header:1, defval:'' });

    // คอลัมน์ขวา: J(9)=Sub Account, K(10)=ชื่อ, L(11)=ประเภท
    const map = {};
    for (let i = 1; i < rows.length; i++) {
      const acc  = String(rows[i][9]  || '').trim();
      const name = String(rows[i][10] || '').trim();
      const type = String(rows[i][11] || '').trim();
      if (acc && type) map[acc] = { name, type };
    }
    // แทนที่ข้อมูลเดิมทั้งหมด
    state.customerTypes = map;
    state.customerPage  = 1;
    // save ลง Google Sheet
    const p = encodeURIComponent(JSON.stringify({ action: 'saveCustomers', customers: map }));
    fetch(GAS_URL + '?data=' + p)
      .then(r => r.json())
      .then(d => console.log('saveCustomers:', d.ok, d.saved))
      .catch(e => console.log('saveCustomers error:', e));
    alert('โหลดข้อมูลลูกค้าสำเร็จ: ' + Object.keys(map).length + ' accounts\nบันทึกลง Google Sheet แล้ว');
    render();
  };
  reader.readAsArrayBuffer(file);
}


function init() {
  const now = new Date();
  const dateStr = `${now.getDate()} ${MONTHS_TH[now.getMonth()]} ${now.getFullYear()} (วัน${DAYS_TH[now.getDay()]})`;
  document.getElementById('today-label').textContent = dateStr;
  // default วันที่ = เมื่อวาน
  const yesterday = new Date(now);
  yesterday.setDate(now.getDate() - 1);
  const yStr = yesterday.toISOString().slice(0,10);
  // ถ้าวันจันทร์ default start = ศุกร์ที่แล้ว
  if (now.getDay() === 1) {
    const fri = new Date(now); fri.setDate(now.getDate() - 3);
    const sun = new Date(now); sun.setDate(now.getDate() - 1);
    setTimeout(() => {
      const d1 = document.getElementById('bill-date');
      const d2 = document.getElementById('bill-date-end');
      const mc = document.getElementById('multi-date-check');
      if (d1) d1.value = fri.toISOString().slice(0,10);
      if (d2) d2.value = sun.toISOString().slice(0,10);
      if (mc) { mc.checked = true; toggleMultiDate(true); }
    }, 100);
  } else {
    setTimeout(() => {
      const d1 = document.getElementById('bill-date');
      if (d1) d1.value = yStr;
    }, 100);
  }
  // โหลด CustomerTypes จาก Google Sheet ทันทีที่เปิด Tool
  // ต้องรอโหลดเสร็จก่อนถึงจะกดคำนวณได้
  state.customersLoaded = false;
  showPage('upload');
  loadCustomersFromSheet();
}

async function loadCustomersFromSheet() {
  const calcBtn = document.getElementById('calc-btn');
  if (calcBtn) {
    calcBtn.disabled = true;
    calcBtn.innerHTML = '<div class="spinner"></div> โหลดข้อมูลลูกค้า...';
  }
  try {
    const resp = await fetch(GAS_URL + '?data=' + encodeURIComponent(JSON.stringify({ action: 'getCustomers' })));
    const data = await resp.json();
    console.log('GAS getCustomers raw:', JSON.stringify(data).slice(0, 300));
    if (data.ok && data.customers && Object.keys(data.customers).length > 0) {
      const cleaned = {};
      Object.entries(data.customers).forEach(([acc, v]) => {
        cleaned[acc] = {
          name: (v.name || '').replace(/^\d+/, '').trim(),
          type: v.type || '',
        };
      });
      state.customerTypes = cleaned;
      console.log('โหลด CustomerTypes:', Object.keys(cleaned).length, 'accounts');
    } else {
      console.log('CustomerTypes: ไม่มีข้อมูลใน Sheet ใช้ค่า default');
    }
  } catch(e) {
    console.log('loadCustomers error:', e.message);
  } finally {
    // set flag เสมอไม่ว่าจะ success หรือ error
    state.customersLoaded = true;
    const btn = document.getElementById('calc-btn');
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6h8M6 2v8" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg> คำนวณรายการ';
    }
    const billCount = document.getElementById('bill-count');
    if (billCount) billCount.textContent = state.bills.length;
  }
}

  else {
    // highlight nav item ที่ตรงกับ page
    const navItems = document.querySelectorAll('.nav-item');
    const pageIdx = {overview:0,upload:1,bills:2,periodic:3,tracking:4,customers:5};
    if (pageIdx[page] !== undefined && navItems[pageIdx[page]])
      navItems[pageIdx[page]].classList.add('active');
  }
  const titles = {
    overview:  ['ภาพรวม','สถานะการเปิดบิลประจำวัน'],
    upload:    ['อัปโหลดไฟล์รายงาน','เลือกไฟล์จาก Admin แล้วระบบจะคำนวณรายการที่ต้องเปิดบิลให้อัตโนมัติ'],
    bills:     ['รายการเปิดบิลวันนี้','คำนวณจากไฟล์ที่อัปโหลด แยกตามประเภทลูกค้า'],
    periodic:  ['เปิดบิลรวมรอบ','ดึงยอดสะสม Credit7D / Credit15D จาก Sheet มาเปิดบิล'],
    tracking:  ['ติดตามค้างชำระ','สถานะการชำระเงินของลูกค้าทั้งหมด'],
    customers: ['ข้อมูลลูกค้า','อัปโหลดไฟล์ data ลค. เพื่อกำหนดประเภทการเปิดบิล'],
  };
  const [title, sub] = titles[page] || ['',''];
  document.getElementById('page-title').textContent = title;
  document.getElementById('page-sub').textContent   = sub;
  render();
}

// ─── Render ───────────────────────────────────────────────────
function render() {
  const c = document.getElementById('main-content');
  if      (state.currentPage === 'upload')   c.innerHTML = renderUpload();
  else if (state.currentPage === 'bills')    c.innerHTML = renderBills();
  else if (state.currentPage === 'periodic') { renderPeriodic(); return; }
  else if (state.currentPage === 'tracking') { renderTracking(); return; }
  else if (state.currentPage === 'customers') { c.innerHTML = renderCustomers(); return; }
  else                                        c.innerHTML = renderOverview();

  // Show/hide calc btn and date selector
  const hasFiles = Object.keys(state.files).length >= 1;
  const calcBtn  = document.getElementById('calc-btn');
  const dateSel  = document.getElementById('date-selector');
  const showCtrl = hasFiles && state.currentPage === 'upload';
  if (calcBtn) calcBtn.style.display = showCtrl ? '' : 'none';
  if (dateSel) dateSel.style.display = showCtrl ? 'flex' : 'none';
  showCompensateToggles(showCtrl);

  // badge count
  document.getElementById('bill-count').textContent = state.bills.length;
}

// ─── Handle file upload ────────────────────────────────────────
function handleFile(evt, key) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb    = XLSX.read(e.target.result, { type:'array' });
    const sheets = {};
    wb.SheetNames.forEach(n => { sheets[n] = XLSX.utils.sheet_to_json(wb.Sheets[n], { header:1, defval:'' }); });
    state.files[key] = { name: file.name, sheets };
    render();
  };
  reader.readAsArrayBuffer(file);
}

// ─── Get selected date range ─────────────────────────────────
function getSelectedDates() {
  const d1 = document.getElementById('bill-date')?.value;
  const d2 = document.getElementById('bill-date-end')?.value;
  const multi = document.getElementById('multi-date-check')?.checked;
  if (!d1) return null;
  if (multi && d2) {
    // สร้าง array ของวันที่ระหว่าง d1 ถึง d2
    const dates = [];
    const cur = new Date(d1);
    const end = new Date(d2);
    while (cur <= end) {
      dates.push(cur.toISOString().slice(0,10));
      cur.setDate(cur.getDate() + 1);
    }
    return dates;
  }
  return [d1];
}

// ─── Parse Flash from Daily report ──────────────────────────
function parseFlashDaily(sheets, carrier, targetDates) {
  const sname = Object.keys(sheets).find(n => n.includes('Daily report') || n.includes('daily'));
  if (!sname) return parseFlashPivot(sheets, carrier); // fallback
  const rows = sheets[sname];
  if (!rows || rows.length < 2) return [];
  const headers = rows[0];
  const dateCol      = headers.findIndex(h => String(h).trim() === 'Date');
  const accCol       = headers.findIndex(h => String(h).includes('Operated by') || String(h) === 'Operated by');
  const nameCol      = headers.findIndex(h => String(h).includes('Sub-account Name'));
  const freightCol   = headers.findIndex(h => /^freight\s*$/i.test(String(h).trim()));
  // COD ต้องไม่ match "COD Amt" — ไฟล์ Flash มีทั้ง col 27 (COD Amt) และ col 31 (COD )
  const codCol       = headers.findIndex(h => /^cod\s*$/i.test(String(h).trim()) && !String(h).toLowerCase().includes('amt'));
  const happyCol     = headers.findIndex(h => String(h).includes('Happy Return'));
  const remoteCol    = headers.findIndex(h => String(h).includes('พื้นที่ห่างไกล'));
  const totalVatCol  = headers.findIndex(h => String(h).includes('Total รวม Vat') || String(h).includes('Total+Vat'));
  const touristCol   = headers.findIndex(h => String(h).includes('พื้นที่ท่องเที่ยว'));
  const pkgCol       = headers.findIndex(h => String(h).includes('Packaging'));
  const flashCareCol = headers.findIndex(h => /flash\s*care/i.test(String(h)) && !/flash\s*care\s*flash/i.test(String(h)));
  const boxShieldCol = headers.findIndex(h => /box\s*shield/i.test(String(h)) && !/box\s*shield\s*flash/i.test(String(h)));

  if (dateCol < 0 || accCol < 0) return parseFlashPivot(sheets, carrier);

  // Debug: แสดง col indices ที่ detect ได้
  console.log(`[Flash parser] dateCol=${dateCol} accCol=${accCol} freightCol=${freightCol} codCol=${codCol} flashCareCol=${flashCareCol}`);
  console.log(`[Flash headers sample]`, headers.slice(28,35).map((h,i)=>`[${i+28}]=${JSON.stringify(h)}`).join(' '));
  // debug: ดู row แรกที่ match date
  const _dbgRow = rows.slice(1).find(r => { const d = extractFlashDate(r); return d && targetDates.includes(d); });
  if (_dbgRow) console.log(`[Flash row sample] len=${_dbgRow.length} col30=${JSON.stringify(_dbgRow[30])} col31=${JSON.stringify(_dbgRow[31])} accCol=${JSON.stringify(_dbgRow[accCol])}`);
  // เพิ่ม: log ค่า freightCol จริง
  if (_dbgRow) console.log(`[Flash freight check] freightCol=${freightCol} val=${JSON.stringify(_dbgRow[freightCol])} row.length=${_dbgRow.length} all cols near freight:`, JSON.stringify(_dbgRow.slice(28,36)));

  // Flash col 0 (Date) อาจเป็น formula =IFERROR(LEFT(C2,11),0)
  // ถ้าอ่านไม่ได้ให้ fallback ใช้ col 2 (PU time) ที่มี timestamp จริง
  const puTimeCol = 2; // col C = PU time = "2026-04-29 17:11:32"

  function extractFlashDate(row) {
    // helper: แปลงค่าเป็น YYYY-MM-DD ไม่ว่าจะเป็น string หรือ Date object
    function toISODate(v) {
      if (!v && v !== 0) return '';
      // Date object
      if (v instanceof Date) {
        return v.getFullYear() + '-' +
               String(v.getMonth()+1).padStart(2,'0') + '-' +
               String(v.getDate()).padStart(2,'0');
      }
      const s = String(v).trim().replace(/^\t+/,'');
      // YYYY-MM-DD หรือ YYYY/MM/DD
      const m1 = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
      if (m1) return `${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;
      return '';
    }

    // ลอง dateCol (col 0) ก่อน
    const d0 = toISODate(row[dateCol]);
    if (d0) return d0;
    // fallback: PU time col (col 2) — อาจเป็น Date object หรือ string timestamp
    const d2 = toISODate(row[puTimeCol]);
    if (d2) return d2;
    return '';
  }
  const VAT_RATE = 0.07;
  const grouped = {};
  for (let i = 1; i < rows.length; i++) {
    const row  = rows[i];
    const rowDateNorm = extractFlashDate(row);
    if (!rowDateNorm || !targetDates.includes(rowDateNorm)) continue;
    const acc  = String(row[accCol]  || '').trim();
    const name = String(row[nameCol] || acc).trim();
    if (!acc || acc === 'nan') continue;
    const key = `${acc}|${rowDateNorm}`; // แยก key ตามวันที่ → 2 วัน = 2 บิล
    if (!grouped[key]) grouped[key] = { acc, name, carrier, billDate: rowDateNorm, trackingCount:0, freight:0, cod:0, happy:0, remote:0, tourist:0, pkg:0, flashCare:0, boxShield:0, total:0 };
    const f = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
    grouped[key].trackingCount += 1;
    grouped[key].freight   += f(row[freightCol]);
    grouped[key].cod       += f(row[codCol]);
    grouped[key].happy     += f(row[happyCol]);
    grouped[key].remote    += f(row[remoteCol]);
    grouped[key].tourist   += f(row[touristCol]);
    grouped[key].pkg       += f(row[pkgCol]);
    grouped[key].flashCare += f(row[flashCareCol]);
    grouped[key].boxShield += f(row[boxShieldCol]);
    grouped[key].total     += f(row[totalVatCol]);
  }
  // คำนวณ VAT สำหรับ COD, Flash Care, Box Shield
  Object.values(grouped).forEach(b => {
    // ถ้า totalVatCol ไม่ได้ให้ค่า (formula string) ให้คำนวณเอง
    if (b.total === 0) {
      const vatBase = b.cod + b.flashCare + b.boxShield;
      b.total = parseFloat((b.freight + b.happy + b.remote + b.tourist + b.pkg + vatBase + (vatBase * VAT_RATE)).toFixed(2));
    }
    b.codVat       = b.cod       > 0 ? parseFloat((b.cod       * VAT_RATE).toFixed(2)) : 0;
    b.flashCareVat = b.flashCare > 0 ? parseFloat((b.flashCare * VAT_RATE).toFixed(2)) : 0;
    b.boxShieldVat = b.boxShield > 0 ? parseFloat((b.boxShield * VAT_RATE).toFixed(2)) : 0;
  });
  return Object.values(grouped).filter(b => b.total > 0);
}

// fallback: pivot (ไม่ filter date)
function parseFlashPivot(sheets, carrier) {
  const sname = Object.keys(sheets).find(n => n.includes('สรุปยอด'));
  if (!sname) return [];
  const rows = sheets[sname];
  let hrow = -1;
  for (let i = 0; i < Math.min(rows.length, 15); i++) {
    if (rows[i].some(v => String(v).includes('Row Labels'))) { hrow = i; break; }
  }
  if (hrow < 0) return [];
  const headers = rows[hrow];
  const totalCol   = headers.findIndex(h => String(h).includes('Total รวม Vat'));
  const freightCol = headers.findIndex(h => String(h).includes('Freight'));
  const codCol     = headers.findIndex(h => String(h).trim() === 'Sum of COD' || String(h).includes('Sum of COD '));
  if (totalCol < 0) return [];
  const result = [];
  for (let i = hrow + 1; i < rows.length; i++) {
    const row  = rows[i];
    const name = String(row[0] || '').trim();
    if (!name || name.toLowerCase().includes('grand total')) continue;
    const total   = parseFloat(row[totalCol])   || 0;
    const freight = parseFloat(row[freightCol]) || 0;
    const cod     = parseFloat(row[codCol])     || 0;
    if (total <= 0) continue;
    result.push({ acc: name, name, carrier, freight, cod, happy:0, remote:0, tourist:0, pkg:0, total });
  }
  return result;
}

// ─── Parse DHL from detail sheet ────────────────────────────
function parseDHLDaily(sheets, targetDates) {
  const sname = Object.keys(sheets).find(n => n.includes('ข้อมูลรายละเอียด') || n.includes('detail'));
  if (!sname) return [];
  const rows = sheets[sname];
  if (!rows || rows.length < 2) return [];
  const headers = rows[0];
  const dateCol      = headers.findIndex(h => String(h).includes('Pick up date'));
  const accCol       = headers.findIndex(h => String(h).includes('Pick Up Account') && !String(h).includes('Name'));
  const nameCol      = headers.findIndex(h => String(h).includes('Pick Up Account Name') || String(h).includes('Customer Name'));
  const freightCol   = headers.findIndex(h => /^freight\s*$/i.test(String(h).trim()));
  const codCol       = headers.findIndex(h => /^cod\s*$/i.test(String(h).trim()));
  const remoteCol    = headers.findIndex(h => String(h).includes('พื้นที่ห่างไกล'));
  const totalVatCol  = headers.findIndex(h => String(h).includes('Total รวม Vat'));
  // รายการเพิ่มเติม DHL (มี VAT)
  const paperPodCol  = headers.findIndex(h => /paper\s*pod/i.test(String(h)));
  const insuranceCol = headers.findIndex(h => String(h).includes('ประกันสินค้า') || /insurance/i.test(String(h)));
  const amDelivCol   = headers.findIndex(h => /am\s*delivery/i.test(String(h)));

  if (dateCol < 0 || accCol < 0) return [];

  // helper: แปลง date value ทุก format → YYYY-MM-DD
  function normDHLDate(v) {
    if (!v) return '';
    const s = String(v).trim();
    // ISO: 2026-04-28
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
    // DD.MM.YYYY หรือ DD-MM-YYYY
    const m = s.match(/^(\d{1,2})[.\-](\d{1,2})[.\-](\d{4})/);
    if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    // Date object จาก XLSX (serial number แปลงแล้ว)
    return s.slice(0,10);
  }

  const VAT_RATE = 0.07;
  const grouped = {};
  for (let i = 1; i < rows.length; i++) {
    const row  = rows[i];
    const rowDateNorm = normDHLDate(row[dateCol]);
    if (!rowDateNorm || !targetDates.includes(rowDateNorm)) continue;
    const acc  = String(row[accCol]  || '').trim();
    const name = String(row[nameCol] || acc).trim();
    if (!acc || acc === 'nan') continue;
    const key = `${acc}|${rowDateNorm}`; // แยกตามวัน
    if (!grouped[key]) grouped[key] = { acc, name, carrier:'DHL', billDate: rowDateNorm, trackingCount:0, freight:0, cod:0, happy:0, remote:0, tourist:0, pkg:0, paperPod:0, insurance:0, amDeliv:0, total:0 };
    const f = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
    grouped[key].trackingCount += 1;
    grouped[key].freight   += f(row[freightCol]);
    grouped[key].cod       += f(row[codCol]);
    grouped[key].remote    += f(row[remoteCol]);
    grouped[key].paperPod  += f(row[paperPodCol]);
    grouped[key].insurance += f(row[insuranceCol]);
    grouped[key].amDeliv   += f(row[amDelivCol]);
  }
  // คำนวณ total เอง (ไม่ใช้ formula col เพราะ XLSX.js อ่านได้แค่ string)
  // VAT applies to: cod, insurance, paperPod, amDeliv
  Object.values(grouped).forEach(b => {
    const vatBase = b.cod + b.insurance + b.paperPod + b.amDeliv;
    b.total = parseFloat((b.freight + b.remote + vatBase + (vatBase * VAT_RATE)).toFixed(2));
    b.codVat       = b.cod       > 0 ? parseFloat((b.cod       * VAT_RATE).toFixed(2)) : 0;
    b.insuranceVat = b.insurance > 0 ? parseFloat((b.insurance * VAT_RATE).toFixed(2)) : 0;
    b.paperPodVat  = b.paperPod  > 0 ? parseFloat((b.paperPod  * VAT_RATE).toFixed(2)) : 0;
    b.amDelivVat   = b.amDeliv   > 0 ? parseFloat((b.amDeliv   * VAT_RATE).toFixed(2)) : 0;
  });
  return Object.values(grouped).filter(b => b.total > 0);
}

// ─── Parse WefastD ───────────────────────────────────────────
function parseWefastDaily(sheets, targetDates) {
  // WF_ACCOUNTS: accounts ที่ต้องเปิดบิล (key = account, value = type default)
  const WF_ACCOUNTS = { 'WF238':'Credit7D', 'WF1663':'เงินสด', 'WF1955':'Credit15D' };
  // ลองหา sheet ชื่อ "ข้อมูลรายละเอียด" หรือ sheet แรกที่ไม่ใช่ summary
  const sname = Object.keys(sheets).find(n => n.includes('ข้อมูลรายละเอียด') || n.includes('detail') || n.includes('Daily') || n.includes('รายละเอียด'));
  if (!sname) {
    console.log('WefastD: ไม่พบ sheet ข้อมูลรายละเอียด, sheets:', Object.keys(sheets));
    return [];
  }
  const rows = sheets[sname];
  if (!rows || rows.length < 2) return [];
  const headers = rows[0];
  console.log('WefastD headers:', headers.slice(0,15));
  const dateCol      = headers.findIndex(h => /^date$/i.test(String(h).trim()) || String(h).includes('วันที่'));
  const accCol       = headers.findIndex(h => /^account$/i.test(String(h).trim()) || String(h).includes('Sub Account'));
  const nameCol      = headers.findIndex(h => /customer\s*name/i.test(String(h)) || String(h).includes('ชื่อลูกค้า'));
  const priceCol     = headers.findIndex(h => String(h).includes('ราคา (บาท)') || /^price$/i.test(String(h).trim()));
  const totalCol     = headers.findIndex(h => /grand\s*total/i.test(String(h)) || String(h).includes('ยอดรวม'));
  const codCol       = headers.findIndex(h => String(h).trim().startsWith('เก็บเงิน') || /^cod$/i.test(String(h).trim()));
  const insuranceCol = headers.findIndex(h => String(h).includes('ประกันสินค้า') || /insurance/i.test(String(h)));
  const boxShieldCol = headers.findIndex(h => /box\s*shield/i.test(String(h)) || String(h).includes('ประกันกล่อง'));

  if (accCol < 0) {
    console.log('WefastD: ไม่พบ column Account');
    return [];
  }

  const VAT_RATE = 0.07;
  const grouped = {};
  for (let i = 1; i < rows.length; i++) {
    const row  = rows[i];
    const rowDate = String(row[dateCol] || '').trim().slice(0,10);
    if (dateCol >= 0 && !targetDates.some(d => rowDate === d || rowDate.includes(d))) continue;
    const acc  = String(row[accCol] || '').trim();
    if (!WF_ACCOUNTS[acc]) continue;
    const name = String(row[nameCol] || acc).trim();
    const key = `${acc}|${rowDate}`; // แยกตามวัน
    if (!grouped[key]) grouped[key] = { acc, name, carrier:'WefastD', billDate: rowDate, freight:0, cod:0, insurance:0, boxShield:0, happy:0, remote:0, tourist:0, pkg:0, total:0, overrideType: WF_ACCOUNTS[acc] };
    grouped[key].freight   += parseFloat(row[priceCol])     || 0;
    grouped[key].total     += parseFloat(row[totalCol])     || 0;
    grouped[key].cod       += parseFloat(row[codCol])       || 0;
    grouped[key].insurance += parseFloat(row[insuranceCol]) || 0;
    grouped[key].boxShield += parseFloat(row[boxShieldCol]) || 0;
  }
  // VAT สำหรับ ประกันสินค้า และ Box Shield
  Object.values(grouped).forEach(b => {
    b.insuranceVat = b.insurance > 0 ? parseFloat((b.insurance * VAT_RATE).toFixed(2)) : 0;
    b.boxShieldVat = b.boxShield > 0 ? parseFloat((b.boxShield * VAT_RATE).toFixed(2)) : 0;
  });
  return Object.values(grouped).filter(b => b.total > 0);
}

// ─── Parse SPX ───────────────────────────────────────────────
function parseSPXDaily(sheets, targetDates) {
  const sname = Object.keys(sheets).find(n => n.includes('ข้อมูลรายละเอียด') && !n.includes('SPX'));
  if (!sname) return [];
  const rows = sheets[sname];
  if (!rows || rows.length < 2) return [];
  const headers = rows[0];
  const dateCol    = headers.findIndex(h => String(h).trim() === 'Date');
  const accCol     = headers.findIndex(h => String(h).trim() === 'Account');
  const nameCol    = headers.findIndex(h => String(h).includes('Sub-account Name'));
  const freightCol = headers.findIndex(h => /^freight\s*$/i.test(String(h).trim()));
  const codCol     = headers.findIndex(h => /^cod\s*$/i.test(String(h).trim()));
  const remoteCol  = headers.findIndex(h => String(h).includes('พื้นที่ห่างไกล'));
  const totalCol   = headers.findIndex(h => String(h).includes('Total+Vat') || String(h).includes('Total รวม Vat'));
  if (accCol < 0) return [];
  const grouped = {};
  for (let i = 1; i < rows.length; i++) {
    const row  = rows[i];
    const rowDate = String(row[dateCol] || '').trim().slice(0,10);
    if (!targetDates.some(d => rowDate === d)) continue;
    const acc  = String(row[accCol] || '').trim();
    const name = String(row[nameCol] || acc).trim();
    if (!acc || acc === 'nan') continue;
    const key = `${acc}|${rowDate}`; // แยกตามวัน
    if (!grouped[key]) grouped[key] = { acc, name, carrier:'SPX', billDate: rowDate, freight:0, cod:0, happy:0, remote:0, tourist:0, pkg:0, total:0 };
    grouped[key].freight += parseFloat(row[freightCol]) || 0;
    grouped[key].cod     += parseFloat(row[codCol])     || 0;
    grouped[key].remote  += parseFloat(row[remoteCol])  || 0;
    grouped[key].total   += parseFloat(row[totalCol])   || 0;
  }
  return Object.values(grouped).filter(b => b.total > 0);
}

// ─── Calculate bills ──────────────────────────────────────────
function calculateBills() {
  // ป้องกันกดก่อน CustomerTypes โหลดเสร็จ
  if (!state.customersLoaded) {
    alert('กำลังโหลดข้อมูลลูกค้าจาก Sheet กรุณารอสักครู่แล้วลองอีกครั้งครับ');
    return;
  }
  const targetDates = getSelectedDates();
  if (!targetDates) { alert('กรุณาเลือกวันที่ก่อนครับ'); return; }
  state.typeFilter = ''; // reset filter เมื่อคำนวณใหม่

  const now     = new Date(targetDates[0]);
  const today   = now.getDay();
  const dateNum = now.getDate();

  function shouldBillToday(type, billDate) {
    if (!type || SKIP_TYPES.some(s => String(type).includes(s))) return false;
    const t = String(type).trim();
    if (t === '' || t === 'เงินสด')       return true;
    if (t === 'ไม่ต้องปิดใบเสร็จ')        return true;
    if (t === 'Credit7D') {
      if (state.compensateCredit7D) return true;
      const d = billDate ? new Date(billDate) : now;
      // หา thisMonday = วันจันทร์ล่าสุด (วันนี้ถ้าเป็นจันทร์)
      // ใช้ targetDates[0] เป็น reference ของ "วันจันทร์ที่เปิดบิล"
      const ref = new Date(targetDates[0]);
      const refDay = ref.getDay(); // 0=อา, 1=จ
      const daysToMon = refDay === 1 ? 0 : (refDay === 0 ? -6 : 1 - refDay);
      const thisMonday = new Date(ref); thisMonday.setDate(ref.getDate() + daysToMon); thisMonday.setHours(0,0,0,0);
      const prevMonday = new Date(thisMonday); prevMonday.setDate(thisMonday.getDate() - 7);
      const lastSunday = new Date(thisMonday); lastSunday.setDate(thisMonday.getDate() - 1); lastSunday.setHours(23,59,59,999);
      // billDate อยู่ใน [prevMonday, lastSunday] → เปิดบิล
      // billDate >= thisMonday → สะสม
      d.setHours(12,0,0,0);
      return d >= prevMonday && d <= lastSunday;
    }
    if (t === 'Credit15D') {
      if (state.compensateCredit15D) return true;
      const d = billDate ? new Date(billDate) : now;
      const ref = new Date(targetDates[0]);
      const dn = ref.getDate();
      // วันที่ 1 → รอบงาน 16-สิ้นเดือนก่อน, วันที่ 16 → รอบงาน 1-15 เดือนนี้
      if (dn === 1) {
        // งานรับ 16-สิ้นเดือนก่อน
        const prevMonth = new Date(ref.getFullYear(), ref.getMonth() - 1, 16);
        const lastDay   = new Date(ref.getFullYear(), ref.getMonth(), 0);
        d.setHours(12,0,0,0);
        return d >= prevMonth && d <= lastDay;
      }
      if (dn === 16) {
        // งานรับ 1-15 เดือนนี้
        const first = new Date(ref.getFullYear(), ref.getMonth(), 1);
        const fifteenth = new Date(ref.getFullYear(), ref.getMonth(), 15);
        d.setHours(12,0,0,0);
        return d >= first && d <= fifteenth;
      }
      return false;
    }
    if (t === 'Credit30D')    return false;
    if (t === 'เปิดบิลรวม')  return false;
    return false;
  }

  // helper: ส่งข้อมูลสะสม Credit7D/15D ลง Sheet
  async function saveAccumulateCredit(bills, creditType) {
    if (!bills || bills.length === 0) return;
    const selDate = document.getElementById('bill-date')?.value || new Date().toISOString().slice(0,10);
    const payload = bills.map(b => ({
      subAcc:        b.acc,
      flowName:      getFlowName(b.acc),
      carrier:       b.carrier,
      type:          creditType,
      billDate:      b.billDate || selDate,
      trackingCount: b.trackingCount || 0,
      freight:       parseFloat(b.freight) || 0,
      cod:           parseFloat(b.cod)     || 0,
      total:         parseFloat(b.total)   || 0,
    }));
    const p = encodeURIComponent(JSON.stringify({ action: 'saveAccumulateCredit', bills: payload, creditType }));
    const resp = await fetch(GAS_URL + '?data=' + p);
    const data = await resp.json();
    console.log(`saveAccumulateCredit ${creditType}:`, data.ok, 'saved:', data.saved);
    return data;
  }

  function isAccumulateType(type) {
    const t = String(type || '').trim();
    return t === 'เปิดบิลรวม' || t === 'Credit30D';
  }

  function getDateRange() {
    function fmtDate(d) {
      var p = d.split('-');
      return p[2]+'/'+p[1]+'/'+p[0]; // dd/MM/yyyy
    }
    if (targetDates.length === 1) return fmtDate(targetDates[0]);
    return fmtDate(targetDates[0]) + '–' + fmtDate(targetDates[targetDates.length-1]);
  }

  // ใช้ customerTypes ที่โหลดจาก Sheet CustomerTypes
  // แปลง {acc: {type,name}} → {acc: type}
  const custTypeMap = {};
  Object.entries(state.customerTypes || {}).forEach(([acc, v]) => {
    const t = typeof v === 'string' ? v : (v.type || '');
    custTypeMap[acc.trim()] = t;
    // normalize: CZ0108-13 → CZ-13 และ CZ-13 → CZ0108-13
    if (acc.startsWith('CZ0108-')) custTypeMap['CZ-' + acc.replace('CZ0108-','')] = t;
    if (/^CZ-\d+/.test(acc))      custTypeMap['CZ0108-' + acc.replace('CZ-','')] = t;
    // normalize: CAZ3461-x ↔ CAZ3461-x (เก็บไว้ตรงๆ)
  });

  // helper: lookup type โดย normalize key
  function lookupType(acc, name) {
    const a = String(acc || '').trim();
    // ลอง exact match ก่อน
    if (custTypeMap[a]) return custTypeMap[a];
    // normalize CZ-xxx ↔ CZ0108-xxx
    if (/^CZ-\d+/.test(a))      return custTypeMap['CZ0108-' + a.replace('CZ-','')] || '';
    if (/^CZ0108-\d+/.test(a))  return custTypeMap['CZ-' + a.replace('CZ0108-','')] || '';
    // ไม่พบใน Sheet → ใช้ default เงินสด (ไม่ใช้ name fallback เพราะ false positive สูง)
    return '';
  }

  // parse ทุกไฟล์
  let rawBills = [];
  if (state.files.flash_wf)  rawBills = rawBills.concat(parseFlashDaily(state.files.flash_wf.sheets,  'Flash WF',  targetDates));
  if (state.files.flash_gap) rawBills = rawBills.concat(parseFlashDaily(state.files.flash_gap.sheets, 'Flash GAP', targetDates));
  if (state.files.dhl)       rawBills = rawBills.concat(parseDHLDaily(state.files.dhl.sheets,   targetDates));
  if (state.files.wefast)    rawBills = rawBills.concat(parseWefastDaily(state.files.wefast.sheets, targetDates));
  if (state.files.spx)       rawBills = rawBills.concat(parseSPXDaily(state.files.spx.sheets,   targetDates));

  // กำหนด type + กรอง internal
  const bills = [];
  const mergedGroups = {};
  const accumulateRaw   = []; // เปิดบิลรวม + Credit30D
  const credit7DRaw     = []; // Credit7D สะสมรายวัน
  const credit15DRaw    = []; // Credit15D สะสมรายวัน

  for (const b of rawBills) {
    const custType = b.overrideType || lookupType(b.acc, b.name) || '';
    if (SKIP_TYPES.some(s => custType.includes(s))) continue;

    if (isAccumulateType(custType)) {
      accumulateRaw.push({ ...b, type: custType });
      continue;
    }

    // Credit7D/15D — บันทึกสะสม แต่เปิดบิลเฉพาะตอนถึงรอบ
    if (custType === 'Credit7D' && !shouldBillToday(custType, b.billDate)) {
      credit7DRaw.push({ ...b, type: custType });
      continue;
    }
    if (custType === 'Credit15D' && !shouldBillToday(custType, b.billDate)) {
      credit15DRaw.push({ ...b, type: custType });
      continue;
    }

    if (!shouldBillToday(custType || 'เงินสด', b.billDate)) continue;

    // special group
    let groupKey = null, groupName = '';
    for (const [gk, gv] of Object.entries(SPECIAL_GROUPS)) {
      if (gv.accounts.some(a => b.acc.includes(a) || b.name.includes(a.replace(/CZ0108-/,'')))) {
        groupKey = gk; groupName = gv.name; break;
      }
    }

    const bill = {
      id:            0,
      subAcc:        b.acc,
      name:          groupName || b.name,
      flowName:      getFlowName(b.acc),
      carrier:       b.carrier,
      type:          custType || 'เงินสด',
      billDate:      b.billDate || targetDates[0], // วันที่ของ row นี้จริงๆ
      trackingCount: b.trackingCount || 0,
      freight:       b.freight    || 0,
      cod:           b.cod        || 0,
      happy:         b.happy      || 0,
      remote:        b.remote     || 0,
      tourist:       b.tourist    || 0,
      pkg:           b.pkg        || 0,
      flashCare:     b.flashCare  || 0,
      boxShield:     b.boxShield  || 0,
      paperPod:      b.paperPod   || 0,
      insurance:     b.insurance  || 0,
      amDeliv:       b.amDeliv    || 0,
      total:         b.total,
      dateRange:     b.billDate
        ? new Date(b.billDate).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'})
        : getDateRange(),
      noReceipt:     custType === 'ไม่ต้องปิดใบเสร็จ',
      isGroup:       !!groupName,
      groupKey,
      lineItems:     buildLineItems(b),
    };

    if (groupKey) {
      if (!mergedGroups[groupKey]) { mergedGroups[groupKey] = { ...bill }; }
      else {
        mergedGroups[groupKey].freight += b.freight;
        mergedGroups[groupKey].cod     += b.cod;
        mergedGroups[groupKey].happy   += b.happy || 0;
        mergedGroups[groupKey].remote  += b.remote || 0;
        mergedGroups[groupKey].total   += b.total;
        mergedGroups[groupKey].subAcc  += ', ' + b.acc;
        if (!mergedGroups[groupKey].carrier.includes(b.carrier))
          mergedGroups[groupKey].carrier += '+' + b.carrier;
        mergedGroups[groupKey].lineItems = buildLineItemsFromBill(mergedGroups[groupKey]);
      }
    } else {
      bills.push(bill);
    }
  }

  Object.values(mergedGroups).forEach(g => bills.push(g));
  bills.forEach((b,i) => b.id = i+1);

  // normalBills = รายการที่เปิดบิลวันนี้ (ไม่มีเปิดบิลรวมแล้ว เพราะแยกออกไป accumulateRaw)
  const normalBills = bills;

  // บันทึก เปิดบิลรวม ลง Sheet ทุกวันที่กดคำนวณ
  if (accumulateRaw.length > 0) {
    const selDate = document.getElementById('bill-date')?.value || new Date().toISOString().slice(0,10);
    const accPayload = accumulateRaw.map(b => ({
      subAcc:        b.acc,
      flowName:      getFlowName(b.acc),
      carrier:       b.carrier,
      type:          b.type,
      dateRange:     getDateRange(),
      billDate:      b.billDate || selDate,
      trackingCount: b.trackingCount || 0,
      freight:       parseFloat(b.freight) || 0,
      cod:           parseFloat(b.cod)     || 0,
      total:         parseFloat(b.total)   || 0,
      noReceipt:     false,
    }));
    const p = encodeURIComponent(JSON.stringify({ action: 'saveAccumulate', bills: accPayload }));
    fetch(GAS_URL + '?data=' + p)
      .then(r => r.json())
      .then(d => {
        console.log('saveAccumulate:', d.ok, 'saved:', d.saved);
        if (d.ok) {
          // แสดง alert แจ้งว่าบันทึกเปิดบิลรวมแล้ว
          const names = accumulateRaw.map(b => `• ${getFlowName(b.acc)} (${b.acc})`).join('\n');
          alert(`📋 บันทึกลูกค้าเปิดบิลรวม ${accumulateRaw.length} รายการลง Sheet แล้ว\n\n${names}\n\nยอดรวมจะถูกเปิดบิลสิ้นเดือน`);
        }
      })
      .catch(e => console.log('saveAccumulate error:', e));
    console.log('บันทึกเปิดบิลรวม', accumulateRaw.length, 'รายการลง Sheet');
  }

  // บันทึก Credit7D สะสมรายวัน (เฉพาะวันที่ไม่ใช่รอบเปิดบิล)
  if (credit7DRaw.length > 0) {
    saveAccumulateCredit(credit7DRaw, 'Credit7D').then(() => {
      console.log(`บันทึก Credit7D สะสม ${credit7DRaw.length} รายการ`);
    });
  }

  // บันทึก Credit15D สะสมรายวัน
  if (credit15DRaw.length > 0) {
    saveAccumulateCredit(credit15DRaw, 'Credit15D').then(() => {
      console.log(`บันทึก Credit15D สะสม ${credit15DRaw.length} รายการ`);
    });
  }

  // อัปเดต badge เตือนว่ามีรายการสะสมรอเปิดบิล
  const periodicCount = credit7DRaw.length + credit15DRaw.length;
  const periodicBadge = document.getElementById('periodic-count');
  if (periodicBadge) {
    periodicBadge.style.display = periodicCount > 0 ? '' : 'none';
    periodicBadge.textContent = '!';
  }

  state.bills = normalBills;
  state.selectedBills = new Set(normalBills.map(b => b.id));
  document.getElementById('bill-count').textContent = normalBills.length;
  showPage('bills');
}

function buildLineItems(b) {
  const items = [];
  if ((b.freight   || 0) > 0) items.push({ label:'ค่าขนส่ง (Freight)',            amount: b.freight,   vat: false });
  if ((b.cod       || 0) > 0) items.push({ label:'ค่าธรรมเนียม COD',               amount: b.cod,       vat: true  });
  if ((b.happy     || 0) > 0) items.push({ label:'Happy Return',                   amount: b.happy,     vat: false });
  if ((b.remote    || 0) > 0) items.push({ label:'ค่าพื้นที่ห่างไกล',              amount: b.remote,    vat: false });
  if ((b.tourist   || 0) > 0) items.push({ label:'ค่าพื้นที่ท่องเที่ยว',            amount: b.tourist,   vat: false });
  if ((b.pkg       || 0) > 0) items.push({ label:'Packaging Fee',                  amount: b.pkg,       vat: false });
  // Flash
  if ((b.flashCare || 0) > 0) items.push({ label:'Flash Care',                     amount: b.flashCare, vat: true  });
  if ((b.boxShield || 0) > 0) items.push({ label:'Box Shield',                     amount: b.boxShield, vat: true  });
  // DHL
  if ((b.paperPod  || 0) > 0) items.push({ label:'Paper POD Fee',                  amount: b.paperPod,  vat: true  });
  if ((b.insurance || 0) > 0) items.push({ label:'ค่าประกันสินค้า',                amount: b.insurance, vat: true  });
  if ((b.amDeliv   || 0) > 0) items.push({ label:'AM Delivery',                    amount: b.amDeliv,   vat: true  });
  return items;
}
function buildLineItemsFromBill(b) {
  return buildLineItems(b);
}

            <td style="font-size:11px;color:var(--text2)">${r['รอบวันที่']}</td>

function isOverdueDate(dateStr) {
  if (!dateStr) return false;
  const parts = dateStr.split('/');
  if (parts.length !== 3) return false;
  const d = new Date(parts[2], parts[1]-1, parts[0]);
  return d < new Date();
}

// ─── Custom Modal (แทน window.confirm ที่ถูก suppress) ────────
function showConfirmModal(msg) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center';
    const box = document.createElement('div');
    box.style.cssText = 'background:#fff;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18)';
    box.innerHTML = `
      <div style="font-size:14px;line-height:1.7;white-space:pre-line;margin-bottom:20px;color:#1c1b17">${msg}</div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button id="_modal_cancel" style="padding:8px 18px;border-radius:7px;border:1px solid #ccc;background:#f5f4f0;cursor:pointer;font-family:inherit;font-size:13px">ยกเลิก</button>
        <button id="_modal_ok" style="padding:8px 18px;border-radius:7px;border:none;background:#0a7c55;color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600">ยืนยัน</button>
      </div>`;
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    box.querySelector('#_modal_ok').onclick     = () => { document.body.removeChild(overlay); resolve(true); };
    box.querySelector('#_modal_cancel').onclick = () => { document.body.removeChild(overlay); resolve(false); };
  });
}

async function syncFlowaccount(btn) {
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> กำลัง Sync...';
  try {
    const resp = await fetch(GAS_URL + '?data=' + encodeURIComponent(JSON.stringify({ action: 'syncFlow' })));
    const data = await resp.json();
    if (data.ok) {
      btn.innerHTML = '✅ Sync เสร็จ (' + data.updated + ' รายการ)';
      setTimeout(() => renderTracking(), 1000);
    } else {
      btn.innerHTML = '❌ ' + (data.error || 'เกิดข้อผิดพลาด');
    }
  } catch(e) {
    btn.innerHTML = '❌ ' + e.message;
  } finally {
    setTimeout(() => { btn.disabled = false; btn.innerHTML = orig; }, 3000);
  }
}

async function markPaid(blNo, carrier) {
  if (!blNo || blNo === '-') { alert('ไม่มี BL No.'); return; }
  const paidDate   = prompt('วันที่ชำระ (dd/mm/yyyy):', new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'}));
  if (!paidDate) return;
  const paidAmount = prompt('ยอดที่ชำระ:');
  if (!paidAmount) return;
  const wht    = prompt('หัก ณ ที่จ่าย (ใส่ 0 ถ้าไม่มี):', '0');
  const invNo2 = prompt('Inv No. (เลขใบกำกับ/ใบเสร็จจาก Flowaccount — ถ้าไม่มีกด OK ข้ามได้):', '') || '';

  try {
    const payload2 = encodeURIComponent(JSON.stringify({
      action: 'updatePayment',
      invNo:  blNo,     // BL No. ใช้ค้นหาแถว
      invNo2: invNo2,   // Inv No. บันทึกลง col K
      carrier, paidDate,
      paidAmount: parseFloat(paidAmount),
      wht: parseFloat(wht||0)
    }));
    const resp = await fetch(GAS_URL + '?data=' + payload2);
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error);
    alert('✅ บันทึกการชำระสำเร็จ!');
    renderTracking();
  } catch(err) {
    alert('เกิดข้อผิดพลาด: ' + err.message);
  }
}

function renderPeriodicUI(c, rows7d, rows15d) {
  // รวมยอดต่อลูกค้าต่อ carrier
  function groupRows(rows) {
    const g = {};
    rows.forEach(r => {
      const key = `${r['Sub Account']}|${r['Carrier']}`;
      if (!g[key]) g[key] = { subAcc: r['Sub Account'], flowName: r['ชื่อลูกค้า (Flowaccount)'], carrier: r['Carrier'], trackingCount:0, freight:0, cod:0, total:0, dates:[] };
      g[key].trackingCount += parseInt(r['จำนวนชิ้น']||0);
      g[key].freight += parseFloat(r['Freight']||0);
      g[key].cod     += parseFloat(r['COD']||0);
      g[key].total   += parseFloat(r['ยอดรวม VAT']||0);
      if (r['วันที่รับงาน']) g[key].dates.push(r['วันที่รับงาน']);
    });
    return Object.values(g);
  }

  const grouped7d  = groupRows(rows7d);
  const grouped15d = groupRows(rows15d);
  const isMonday   = new Date().getDay() === 1;
  const is1or16    = [1,16].includes(new Date().getDate());

  function renderTable(grouped, creditType, isRoundDay) {
    if (grouped.length === 0) return `<div class="empty" style="padding:20px">ไม่มีข้อมูลสะสม ${creditType}</div>`;
    const banner = !isRoundDay
      ? `<div class="alert alert-amber" style="margin-bottom:12px">
          <svg class="alert-icon" width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" fill="#92400e"/><path d="M7 4v4M7 10v.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>
          <div><strong>ไม่ใช่รอบปกติ</strong> — กรุณาตรวจสอบยอดให้ถูกต้องก่อนเปิดบิล</div>
        </div>` : '';
    const rows = grouped.map((g,i) => {
      const dateRange = g.dates.length > 0
        ? g.dates.sort()[0] + ' – ' + g.dates.sort().at(-1)
        : '-';
      return `<tr>
        <td><input type="checkbox" id="p-${creditType}-${i}" checked style="accent-color:var(--blue)"></td>
        <td style="white-space:normal">
          <div style="font-weight:600;font-size:12px">${g.flowName}</div>
          <div style="font-size:11px;color:var(--text3)">${g.subAcc}</div>
        </td>
        <td><span class="badge badge-${g.carrier==='Flash'||g.carrier==='Flash WF'?'blue':g.carrier==='DHL'?'gray':'purple'}" style="font-size:10px">${g.carrier}</span></td>
        <td style="font-size:11px;color:var(--text2)">${dateRange}</td>
        <td class="right mono">฿${g.freight.toLocaleString('th-TH',{minimumFractionDigits:2})}</td>
        <td class="right mono">${g.cod > 0 ? '฿'+g.cod.toLocaleString('th-TH',{minimumFractionDigits:2}) : '–'}</td>
        <td class="right mono" style="font-weight:700">฿${g.total.toLocaleString('th-TH',{minimumFractionDigits:2})}</td>
      </tr>`;
    }).join('');
    const totalAmt = grouped.reduce((s,g)=>s+g.total,0);
    return `
      ${banner}
      <div class="tbl-wrap">
        <table class="tbl" style="table-layout:auto;min-width:700px">
          <thead><tr>
            <th style="width:32px"></th>
            <th style="min-width:200px">ลูกค้า</th>
            <th style="width:90px">Carrier</th>
            <th style="width:150px">รอบวันที่</th>
            <th class="right" style="width:110px">Freight</th>
            <th class="right" style="width:110px">COD</th>
            <th class="right" style="width:120px">ยอดรวม VAT</th>
          </tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr style="font-weight:700;border-top:2px solid var(--border)">
            <td colspan="6" style="padding:10px 12px">รวม ${grouped.length} รายการ</td>
            <td class="right mono" style="padding:10px 12px">฿${totalAmt.toLocaleString('th-TH',{minimumFractionDigits:2})}</td>
          </tr></tfoot>
        </table>
      </div>
      <div style="display:flex;justify-content:flex-end;padding:12px 0 0">

async function confirmPeriodicBills(creditType) {
  // ดึงข้อมูลใหม่จาก Sheet แล้วเปิดบิล
  const resp = await fetch(GAS_URL + '?data=' + encodeURIComponent(JSON.stringify({ action: 'getAccumulateCredit', creditType })));
  const data = await resp.json();
  if (!data.ok || !data.rows?.length) { alert('ไม่มีข้อมูลสะสม'); return; }

  // groupRows
  const g = {};
  data.rows.forEach(r => {
    const key = `${r['Sub Account']}|${r['Carrier']}`;
    if (!g[key]) g[key] = { subAcc: r['Sub Account'], flowName: r['ชื่อลูกค้า (Flowaccount)'], carrier: r['Carrier'], type: creditType, freight:0, cod:0, total:0, dates:[] };
    g[key].freight += parseFloat(r['Freight']||0);
    g[key].cod     += parseFloat(r['COD']||0);
    g[key].total   += parseFloat(r['ยอดรวม VAT']||0);
    if (r['วันที่รับงาน']) g[key].dates.push(r['วันที่รับงาน']);
  });
  const grouped = Object.values(g);
  const totalAmt = grouped.reduce((s,g)=>s+g.total,0).toLocaleString('th-TH',{minimumFractionDigits:2});

  if (!await showConfirmModal(`ยืนยันเปิดบิล ${creditType} จำนวน ${grouped.length} ราย\nยอดรวม ฿${totalAmt}\n\nระบบจะเปิดบิลใน Flowaccount และล้างข้อมูลสะสม`)) return;

  const selDate = new Date().toISOString().slice(0,10);
  const results = [];
  for (const bill of grouped) {
    const dateRange = bill.dates.length > 0
      ? `งานวันที่ ${bill.dates.sort()[0].replace(/\d{4}/,d=>parseInt(d)+543)} - ${bill.dates.sort().at(-1).replace(/\d{4}/,d=>parseInt(d)+543)}//${bill.carrier.replace(' WF','').replace(' GAP','')}`
      : '';
    const payload = encodeURIComponent(JSON.stringify({ action: 'openBill', bill: {
      subAcc:        bill.subAcc,
      flowName:      bill.flowName,
      carrier:       bill.carrier,
      type:          creditType,
      dateRange:     dateRange,
      billDate:      selDate,
      trackingCount: bill.trackingCount || 0,
      freight:       bill.freight,
      cod:           bill.cod,
      total:         bill.total,
    }}));
    try {
      const r = await fetch(GAS_URL + '?data=' + payload).then(r=>r.json());
      results.push({ name: bill.flowName, ok: r.ok, invNo: r.invNo, error: r.error });
    } catch(e) {
      results.push({ name: bill.flowName, ok: false, error: e.message });
    }
  }

  const ok   = results.filter(r=>r.ok);
  const fail = results.filter(r=>!r.ok);
  let msg = `✅ เปิดบิลสำเร็จ ${ok.length} รายการ`;
  if (fail.length) msg += `\n❌ ไม่สำเร็จ ${fail.length} รายการ:\n` + fail.map(r=>`• ${r.name}: ${r.error}`).join('\n');
  alert(msg);

  // ล้างข้อมูลสะสมหลังเปิดบิลครบ
  if (ok.length > 0) {
    await fetch(GAS_URL + '?data=' + encodeURIComponent(JSON.stringify({ action: 'clearAccumulateCredit', creditType })));
  }
  renderPeriodic();
}
function renderOverview() {
  const bills = state.bills;
  const hasFiles = Object.keys(state.files).length > 0;

  if (!hasFiles) {
    return `<div class="card" style="text-align:center;padding:40px 20px">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="margin:0 auto 16px;display:block;opacity:.3">
        <rect x="8" y="8" width="32" height="32" rx="4" stroke="currentColor" stroke-width="2"/>
        <path d="M24 16v16M16 24h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div style="font-size:14px;font-weight:500;margin-bottom:8px">ยังไม่มีข้อมูล</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:20px">อัปโหลดไฟล์รายงานเพื่อเริ่มต้นใช้งาน</div>
      <button class="btn btn-primary btn-sm" onclick="showPage('upload',this)">เริ่มต้น →</button>
    </div>`;
  }

  // สรุปจาก bills ที่คำนวณแล้ว
  const totalBills  = bills.length;
  const totalAmt    = bills.reduce((s,b) => s + b.total, 0);
  const byCarrier   = {};
  bills.forEach(b => {
    const c = b.carrier.replace(' WF','').replace(' GAP','');
    if (!byCarrier[c]) byCarrier[c] = { count:0, total:0 };
    byCarrier[c].count++;
    byCarrier[c].total += b.total;
  });
  const byType = {};
  bills.forEach(b => {
    if (!byType[b.type]) byType[b.type] = 0;
    byType[b.type]++;
  });

  const carrierRows = Object.entries(byCarrier).map(([c,d]) => `
    <tr>
      <td><span class="badge badge-${c==='Flash'?'blue':c==='DHL'?'gray':c==='WefastD'?'purple':'amber'}" style="font-size:10px">${c}</span></td>
      <td class="right" style="font-size:12px">${d.count} ราย</td>
      <td class="right mono" style="font-size:12px;font-weight:500">฿${d.total.toLocaleString('th-TH',{minimumFractionDigits:2})}</td>
    </tr>`).join('');

  const typeRows = Object.entries(byType).map(([t,n]) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
      <span class="badge badge-${t==='Credit7D'?'blue':t==='Credit15D'?'purple':t==='Credit30D'?'red':t==='เงินสด'?'green':'gray'}" style="font-size:10px">${t}</span>
      <span style="font-size:12px;font-weight:500">${n} ราย</span>
    </div>`).join('');

  const selDate = document.getElementById('bill-date')?.value || '-';
  const selDateDisplay = selDate !== '-' ? new Date(selDate).toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'}) : '-';

  return `
  <div class="grid-4" style="margin-bottom:12px">
    <div class="metric">
      <div class="metric-label">รายการวันนี้</div>
      <div class="metric-value" style="color:var(--blue)">${totalBills}</div>
      <div class="metric-sub">${selDateDisplay}</div>
    </div>
    <div class="metric">
      <div class="metric-label">ยอดรวมทั้งหมด</div>
      <div class="metric-value" style="color:var(--text);font-size:16px">฿${totalAmt.toLocaleString('th-TH',{minimumFractionDigits:2})}</div>
      <div class="metric-sub">รวม VAT</div>
    </div>
    <div class="metric">
      <div class="metric-label">ไฟล์ที่โหลด</div>
      <div class="metric-value" style="color:var(--green)">${Object.keys(state.files).length}</div>
      <div class="metric-sub">จาก 5 ไฟล์</div>
    </div>
    <div class="metric">
      <div class="metric-label">รอเปิดบิล</div>
      <div class="metric-value" style="color:var(--amber)">${totalBills}</div>
      <div class="metric-sub">รายการ</div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-hd"><div class="card-title">ยอดแยกตาม Carrier</div></div>
      <div class="card-body">
        ${totalBills === 0 ? '<div class="empty" style="padding:20px">กดคำนวณรายการก่อน</div>' :
        `<table class="tbl" style="font-size:12px">
          <thead><tr><th>Carrier</th><th class="right">จำนวน</th><th class="right">ยอด VAT</th></tr></thead>
          <tbody>${carrierRows}</tbody>
          <tfoot><tr style="font-weight:600;border-top:2px solid var(--border)">
            <td>รวม</td>
            <td class="right">${totalBills} ราย</td>
            <td class="right mono">฿${totalAmt.toLocaleString('th-TH',{minimumFractionDigits:2})}</td>
          </tr></tfoot>
        </table>`}
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><div class="card-title">แยกตามประเภทลูกค้า</div></div>
      <div class="card-body">
        ${totalBills === 0 ? '<div class="empty" style="padding:20px">กดคำนวณรายการก่อน</div>' : typeRows}
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:0">
    <div class="card-hd">
      <div class="card-title">ทางลัด</div>
    </div>
    <div class="card-body" style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="showPage('upload',this)">📁 อัปโหลดไฟล์</button>
      <button class="btn btn-sm" onclick="showPage('bills',this)">📋 รายการเปิดบิล (${totalBills})</button>
      <button class="btn btn-sm" onclick="showPage('tracking',this)">💰 ติดตามค้างชำระ</button>
    </div>
  </div>`;
}

// ─── Actions ──────────────────────────────────────────────────
function toggleBill(id, checked) {
  if (checked) state.selectedBills.add(id);
  else         state.selectedBills.delete(id);
  render();
}

function selectAll(checked) {
  const activeBills = state.typeFilter
    ? state.bills.filter(b => b.type === state.typeFilter)
    : state.bills;
  if (checked) activeBills.forEach(b => state.selectedBills.add(b.id));
  else         activeBills.forEach(b => state.selectedBills.delete(b.id));
  render();
  const hdr = document.getElementById('check-all');
  if (hdr) hdr.checked = checked;
}

function filterByType(type) {
  state.typeFilter = type || '';
  // auto-select ตาม filter ที่เลือก
  if (!type) {
    state.bills.forEach(b => state.selectedBills.add(b.id));
  } else {
    state.selectedBills.clear();
    state.bills.filter(b => b.type === type).forEach(b => state.selectedBills.add(b.id));
  }
  render();
}

function exportExcel() {
  const selected = state.bills.filter(b => state.selectedBills.has(b.id));
  if (!selected.length) { alert('กรุณาเลือกรายการก่อนครับ'); return; }
  const ws = XLSX.utils.json_to_sheet(selected.map(b => ({
    'Sub Account': b.subAcc,
    'ชื่อลูกค้า':  b.name,
    'Carrier':     b.carrier,
    'ประเภท':      b.type,
    'รอบวันที่':   b.dateRange,
    'Freight':     b.freight,
    'COD':         b.cod,
    'รวม VAT':     b.total,
    'หมายเหตุ':    b.noReceipt ? 'ไม่ต้องปิดใบเสร็จ' : '',
  })));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'รายการเปิดบิล');
  XLSX.writeFile(wb, `เปิดบิล_${new Date().toLocaleDateString('th-TH').replace(/\//g,'-')}.xlsx`);
}

async function confirmBills() {
  const selected = state.bills.filter(b => state.selectedBills.has(b.id));
  if (!selected.length) { alert('กรุณาเลือกรายการก่อนครับ'); return; }

  const total    = selected.reduce((s,b) => s+b.total, 0);
  const totalFmt = total.toLocaleString('th-TH',{minimumFractionDigits:2});

  const selDate = document.getElementById('bill-date')?.value;
  if (!selDate) { alert('กรุณาเลือกวันที่รับงานก่อนเปิดบิลครับ'); return; }

  // ─ เช็ค duplicate: ถามก่อนถ้าพบว่าเปิดบิลวันนี้ไปแล้ว ─
  const dateDisplay = new Date(selDate).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});
  try {
    const dupChecks = await Promise.all(selected.map(async b => {
      const p = encodeURIComponent(JSON.stringify({ action:'checkDuplicate', subAcc: b.subAcc, carrier: b.carrier, billDate: dateDisplay }));
      const r = await fetch(GAS_URL + '?data=' + p);
      const d = await r.json();
      return { subAcc: b.subAcc, name: b.name, duplicate: d.duplicate, blNo: d.blNo };
    }));
    const dups = dupChecks.filter(d => d.duplicate);
    if (dups.length > 0) {
      const dupList = dups.map(d => `• ${d.name} (${d.subAcc}) — BL: ${d.blNo||'?'}`).join('\n');
      const proceed = await showConfirmModal(`⚠️ พบรายการที่เปิดบิลวันที่ ${dateDisplay} ไปแล้ว:\n\n${dupList}\n\nต้องการเปิดบิลซ้ำหรือไม่?`);
      if (!proceed) return;
    }
  } catch(e) { console.log('dup check error:', e); }

  if (!await showConfirmModal(`ยืนยันเปิดบิล ${selected.length} รายการ\nยอดรวม ฿${totalFmt}\n\nระบบจะเปิดบิลใน Flowaccount และบันทึกลง Google Sheet`)) return;
  const bills = selected.map(b => ({
    subAcc:    b.subAcc,
    flowName:  getFlowName(b.subAcc),
    carrier:       b.carrier,
    type:          b.type,
    dateRange:     b.dateRange,
    billDate:      b.billDate || selDate,
    trackingCount: b.trackingCount || 0,
    freight:       parseFloat(b.freight)   || 0,
    cod:           parseFloat(b.cod)       || 0,
    happy:         parseFloat(b.happy)     || 0,
    remote:        parseFloat(b.remote)    || 0,
    tourist:       parseFloat(b.tourist)   || 0,
    pkg:           parseFloat(b.pkg)       || 0,
    flashCare:     parseFloat(b.flashCare) || 0,
    boxShield:     parseFloat(b.boxShield) || 0,
    paperPod:      parseFloat(b.paperPod)  || 0,
    insurance:     parseFloat(b.insurance) || 0,
    amDeliv:       parseFloat(b.amDeliv)   || 0,
    total:         parseFloat(b.total)     || 0,
    noReceipt:     b.noReceipt || false,
  }));

  // แสดง loading
  const btn = document.querySelector('.btn-green');
  const origText = btn?.innerHTML || '';
  if (btn) btn.innerHTML = '<div class="spinner"></div> กำลังเปิดบิล...';

  try {
    // ส่งทีละรายการเพื่อหลีกเลี่ยง URL length limit
    const results = [];
    for (const bill of bills) {
      try {
        console.log(`📤 ส่งเปิดบิล [${bill.subAcc}] remote=${bill.remote} freight=${bill.freight} paperPod=${bill.paperPod} cod=${bill.cod}`);
        const payload = encodeURIComponent(JSON.stringify({ action: 'openBill', bill }));
        const resp = await fetch(GAS_URL + '?data=' + payload);
        const r    = await resp.json();
        if (!r.ok) console.error(`❌ เปิดบิลไม่สำเร็จ [${bill.subAcc}]:`, r.error, '| full response:', JSON.stringify(r));
        results.push({ subAcc: bill.subAcc, billDate: bill.billDate, ok: r.ok, invNo: r.invNo, error: r.error });
        // อัปเดต progress
        const progMsg = document.createElement('div');
        progMsg.className = 'log-line';
        progMsg.innerHTML = `<span style="font-size:11px;color:${r.ok?'var(--green)':'var(--red)'}">${r.ok?'✓':'✗'} ${bill.name}: ${r.ok?r.invNo:r.error}</span>`;
        document.querySelector('.log-panel')?.appendChild(progMsg);
      } catch(e) {
        results.push({ subAcc: bill.subAcc, billDate: bill.billDate, ok: false, error: e.message });
      }
    }
    const data = { ok: true, results };

    if (!data.ok) throw new Error(data.error || 'เกิดข้อผิดพลาด');

    // results ถูก declare แล้วข้างบน
    const success = results.filter(r => r.ok).length;
    const failed  = results.filter(r => !r.ok).length;

    // แสดงผลลัพธ์
    let msg = `เปิดบิลสำเร็จ ${success} รายการ`;
    if (failed > 0) msg += `\nไม่สำเร็จ ${failed} รายการ`;

    const invNos = results.filter(r => r.ok && r.invNo).map(r => `• ${r.subAcc}: ${r.invNo}`).join('\n');
    if (invNos) msg += `\n\nINV No.:\n${invNos}`;
    msg += `\n\nบันทึกลง Google Sheet แล้ว`;

    alert(msg);

    // อัปเดต state - ลบเฉพาะรายการที่เปิดไปแล้ว (match ทั้ง subAcc + billDate)
    const doneKeys = new Set(
      results.filter(r => r.ok).map(r => `${r.subAcc}|${r.billDate}`)
    );
    state.bills = state.bills.filter(b => !doneKeys.has(`${b.subAcc}|${b.billDate}`));
    state.selectedBills = new Set(state.bills.map(b => b.id));
    document.getElementById('bill-count').textContent = state.bills.length;
    render();

  } catch(err) {
    alert('เกิดข้อผิดพลาด: ' + err.message + '\n\nตรวจสอบว่า GAS Deploy เป็น Anyone แล้ว');
  } finally {
    if (btn) btn.innerHTML = origText;
  }
}

init();
</script>
